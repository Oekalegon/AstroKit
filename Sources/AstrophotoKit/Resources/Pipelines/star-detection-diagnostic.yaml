id: star_detection_diagnostic
name: Star Detection Diagnostic Pipeline
description: >
  Runs the same star detection sub-pipeline used internally by all registration processors
  (blur → background subtraction → threshold → erosion → dilation → connected components → FWHM)
  and outputs an annotated image with ellipses drawn around every detected source.

  Use this pipeline to verify which sources are being detected in a single frame before
  running registration. The detected source count and positions should match what the
  registration processor reports in its star_count column.

  Key parameters to tune are the same as the registration pipelines:
    threshold_value  — increase to detect fewer, brighter sources only
    max_fwhm_ratio   — reduce to reject more extended sources (0 = disabled)
    max_eccentricity — reduce to reject more elongated sources (0 = disabled)

steps:
  - id: grayscale
    type: grayscale
    name: Grayscale
    description: Converts the input frame to grayscale
    dataInputs:
      - name: input_frame
        type: frame
        from: input_frame
        description: The input frame to analyse
    parameters: []
    outputs:
      - name: grayscale_frame
        type: frame
        description: Grayscale version of the input frame

  - id: blur
    type: gaussian_blur
    name: Gaussian Blur
    description: Applies Gaussian blur to smooth noise before detection
    dataInputs:
      - name: input_frame
        type: frame
        from: grayscale.grayscale_frame
        description: Grayscale input frame
    parameters:
      - name: radius
        from: blur_radius
        default_value: 3.0
        description: Gaussian blur radius in pixels applied before star detection
    outputs:
      - name: blurred_frame
        type: frame
        description: Blurred frame

  - id: background
    type: background_estimation
    name: Background Estimation
    description: Estimates and subtracts the sky background
    dataInputs:
      - name: input_frame
        type: frame
        from: blur.blurred_frame
        description: Blurred frame
    parameters: []
    outputs:
      - name: background_frame
        type: frame
        description: Estimated background
      - name: background_subtracted_frame
        type: frame
        description: Background-subtracted frame
      - name: background_level
        type: table
        description: Background level estimate

  - id: threshold
    type: threshold
    name: Threshold
    description: Creates a binary mask of candidate sources above the sigma threshold
    dataInputs:
      - name: input_frame
        type: frame
        from: background.background_subtracted_frame
        description: Background-subtracted frame
    parameters:
      - name: threshold_value
        from: threshold_value
        default_value: 3.0
        description: Sigma multiplier for the detection threshold — increase to detect only bright sources
      - name: method
        default_value: sigma
        description: Threshold method
    outputs:
      - name: thresholded_frame
        type: frame
        description: Binary candidate mask

  - id: erosion
    type: erosion
    name: Erosion
    description: Removes isolated noise pixels from the binary mask
    dataInputs:
      - name: input_frame
        type: frame
        from: threshold.thresholded_frame
        description: Binary candidate mask
    parameters:
      - name: kernel_size
        from: erosion_kernel_size
        default_value: 3
        description: Morphological erosion kernel size
    outputs:
      - name: eroded_frame
        type: frame
        description: Eroded binary mask

  - id: dilation
    type: dilation
    name: Dilation
    description: Restores eroded source footprints
    dataInputs:
      - name: input_frame
        type: frame
        from: erosion.eroded_frame
        description: Eroded binary mask
    parameters:
      - name: kernel_size
        from: dilation_kernel_size
        default_value: 3
        description: Morphological dilation kernel size
    outputs:
      - name: dilated_frame
        type: frame
        description: Dilated binary mask

  - id: connected_components
    type: connected_components
    name: Connected Components
    description: Labels connected blobs and computes centroids
    dataInputs:
      - name: input_frame
        type: frame
        from: dilation.dilated_frame
        description: Dilated binary mask
    parameters: []
    outputs:
      - name: pixel_coordinates
        type: table
        description: Centroid coordinates of all detected blobs

  - id: fwhm
    type: fwhm
    name: FWHM Measurement
    description: Measures FWHM, eccentricity, and flux for each detected source
    dataInputs:
      - name: input_frame
        type: frame
        from: background.background_subtracted_frame
        description: Background-subtracted frame (intensity profile for Gaussian fitting)
      - name: pixel_coordinates
        type: table
        from: connected_components.pixel_coordinates
        description: Blob centroids from connected components
    parameters: []
    outputs:
      - name: pixel_coordinates
        type: table
        description: Source table with fwhm_major, fwhm_minor, eccentricity, flux columns
        metadata:
          table_type: star_catalog
      - name: median_fwhm
        type: table
        description: Median FWHM statistics

  - id: overlay
    type: star_detection_overlay
    name: Detection Overlay
    description: Draws ellipses around every detected source on the original frame
    dataInputs:
      - name: input_frame
        type: frame
        from: input_frame
        description: Original input frame (used as the background image for the overlay)
      - name: pixel_coordinates
        type: table
        from: fwhm.pixel_coordinates
        description: Detected sources with FWHM measurements
    parameters:
      - name: draw_ellipses
        default_value: 1
        description: Draw ellipses around detected sources
      - name: draw_quads
        default_value: 0
        description: Skip quad visualisation (not relevant for this diagnostic)
      - name: ellipse_color_r
        default_value: 1.0
        description: Ellipse colour — red channel
      - name: ellipse_color_g
        default_value: 0.3
        description: Ellipse colour — green channel
      - name: ellipse_color_b
        default_value: 0.0
        description: Ellipse colour — blue channel
      - name: ellipse_width
        default_value: 2.0
        description: Ellipse line width in pixels
    outputs:
      - name: annotated_frame
        type: frame
        description: Input frame annotated with ellipses at every detected source position
        metadata:
          processing_stage: visualization
          frame_type: processedLight
