id: autofocus_focused
name: Autofocus Pipeline (Focused Stars)
description: Runs the full star-detection pipeline on a near-focus image and calculates
  the Half-Flux Diameter (HFD) for each detected star. Run this pipeline once for each
  focuser position to collect (focuser_position, median_hfd) pairs, then pass the
  aggregated table to the autofocus_curve processor.

steps:
  - id: grayscale
    type: grayscale
    name: Grayscale
    description: Converts the input frame to grayscale
    dataInputs:
      - name: input_frame
        type: frame
        from: input_frame
        metadata_restrictions:
          frame_type:
            - light
        description: Light frame at a given focuser position
    parameters: []
    outputs:
      - name: grayscale_frame
        type: frame
        description: Grayscale frame
        metadata:
          processing_stage: "color_conversion"
          image_type: "grayscale"

  - id: blur
    type: gaussian_blur
    name: Gaussian Blur
    description: Noise reduction before star detection
    dataInputs:
      - name: input_frame
        type: frame
        from: grayscale.grayscale_frame
        description: Grayscale frame
    parameters:
      - name: radius
        from: blur_radius
        default_value: 3.0
    outputs:
      - name: blurred_frame
        type: frame
        description: Blurred frame
        metadata:
          processing_stage: "noise_reduction"
          image_type: "grayscale"

  - id: background
    type: background_estimation
    name: Background Estimation
    description: Estimates and subtracts the sky background
    dataInputs:
      - name: input_frame
        type: frame
        from: blur.blurred_frame
        description: Blurred frame
    parameters:
      - name: cell_size
        from: cell_size
        default_value: 64
        description: Mesh cell size in pixels
    outputs:
      - name: background_frame
        type: frame
        description: Estimated background
        metadata:
          processing_stage: "background_estimation"
          image_type: "grayscale"
      - name: background_subtracted_frame
        type: frame
        description: Background-subtracted frame
        metadata:
          processing_stage: "background_subtraction"
          image_type: "grayscale"
      - name: background_level
        type: table
        description: Background level scalar

  - id: threshold
    type: threshold
    name: Threshold
    description: Binary star mask
    dataInputs:
      - name: input_frame
        type: frame
        from: background.background_subtracted_frame
    parameters:
      - name: threshold_value
        from: threshold_value
        default_value: 3.0
      - name: method
        default_value: "sigma"
    outputs:
      - name: thresholded_frame
        type: frame
        description: Binary mask
        metadata:
          processing_stage: "thresholding"
          image_type: "binary"

  - id: erosion
    type: erosion
    name: Erosion
    description: Noise removal from binary mask
    dataInputs:
      - name: input_frame
        type: frame
        from: threshold.thresholded_frame
    parameters:
      - name: kernel_size
        default_value: 3
    outputs:
      - name: eroded_frame
        type: frame
        description: Eroded mask
        metadata:
          processing_stage: "morphological_processing"
          image_type: "binary"

  - id: dilation
    type: dilation
    name: Dilation
    description: Restores star shapes
    dataInputs:
      - name: input_frame
        type: frame
        from: erosion.eroded_frame
    parameters:
      - name: kernel_size
        default_value: 3
    outputs:
      - name: dilated_frame
        type: frame
        description: Dilated mask
        metadata:
          processing_stage: "morphological_processing"
          image_type: "binary"

  - id: connected_components
    type: connected_components
    name: Connected Components
    description: Identifies star blobs
    dataInputs:
      - name: input_frame
        type: frame
        from: dilation.dilated_frame
    parameters: []
    outputs:
      - name: pixel_coordinates
        type: table
        description: Per-star blob properties
        metadata:
          processing_stage: "star_detection"
          table_type: "star_catalog"

  - id: fwhm
    type: fwhm
    name: FWHM Calculation
    description: Refines star centroids and measures FWHM
    dataInputs:
      - name: input_frame
        type: frame
        from: background.background_subtracted_frame
      - name: pixel_coordinates
        type: table
        from: connected_components.pixel_coordinates
    parameters: []
    outputs:
      - name: pixel_coordinates
        type: table
        description: Star table with FWHM and saturation flag
        metadata:
          processing_stage: "fwhm_calculation"
          table_type: "star_catalog"
      - name: median_fwhm
        type: table
        description: Median FWHM statistics

  - id: hfd
    type: hfd
    name: HFD Calculation
    description: Calculates Half-Flux Diameter for each star — the primary autofocus metric
    dataInputs:
      - name: input_frame
        type: frame
        from: background.background_subtracted_frame
        description: Background-subtracted frame for HFD measurement
      - name: pixel_coordinates
        type: table
        from: fwhm.pixel_coordinates
        description: Star table (focused-star mode)
    parameters:
      - name: region_multiplier
        from: hfd_region_multiplier
        default_value: 4.0
        description: Region size as multiple of star major axis
      - name: min_region_size
        default_value: 15
      - name: max_region_size
        default_value: 400
    outputs:
      - name: hfd_measurements
        type: table
        description: Per-star HFD, flux, centroid, saturation flag
        metadata:
          processing_stage: "hfd_calculation"
          table_type: "star_catalog"
      - name: median_hfd
        type: table
        description: Median HFD and sigma-clipped mean across all unsaturated stars
        metadata:
          processing_stage: "hfd_calculation"
          table_type: "statistics"
