id: dark_calibration
name: Dark Frame Calibration Pipeline
description: |
  Subtracts a master bias from each dark frame and stacks the result into a master dark.

  Requires a pre-made master bias (run bias_calibration first, or provide your own).
  Dark frames must be taken at the same exposure time and sensor temperature as the
  light frames they will be applied to — mismatches are logged as warnings.

  Output:
  - master_frame — master dark frame ready to use in calibrate_lights

steps:
  # Step 1: Subtract master bias from each dark frame
  - id: subtract_bias_from_dark
    type: subtract_frames
    name: Subtract Master Bias from Dark Frames
    description: Removes the fixed bias pedestal from each dark frame before stacking.
    dataInputs:
      - name: input_frame
        type: frameSet
        from: dark_frames
        is_collection: true
        collection_mode: individually
        description: Raw dark frames (one process per frame)
      - name: subtract_frame
        type: frame
        from: master_bias
        description: Master bias frame to subtract from each dark
    parameters:
      - name: clip_to_zero
        from: clip_to_zero
        default_value: false
        description: Clamp negative values to zero after subtraction
    outputs:
      - name: calibrated_frame
        type: frame
        description: Bias-subtracted dark frame
        metadata:
          frame_type: "calibratedDark"
          processing_stage: "calibration"
          image_type: "grayscale"

  # Step 2: Stack calibrated dark frames into master dark
  - id: stack_dark
    type: stack_calibration_frames
    name: Stack Dark Frames
    description: Combines bias-corrected dark frames into a master dark using median or mean.
    dataInputs:
      - name: input_frames
        type: frameSet
        from: subtract_bias_from_dark.calibrated_frame
        is_collection: true
        collection_mode: together
        description: Bias-corrected dark frames
    parameters:
      - name: method
        from: stacking_method
        default_value: "median"
        description: Combine method — median (default) or mean
    outputs:
      - name: master_frame
        type: frame
        description: Master dark frame
        metadata:
          frame_type: "masterDark"
          processing_stage: "calibration"
          image_type: "grayscale"
